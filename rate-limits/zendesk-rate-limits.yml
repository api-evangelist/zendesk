specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Zendesk
providerId: zendesk
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Customer Service
  - Help Center
  - Ticketing
  - CRM
  - Rate Limiting
description: |
  Zendesk publishes per-plan account-wide API rate limits in requests per minute,
  with additional endpoint-specific limits, a job-queue cap, and an account-wide
  spike-protection ceiling. Limits scale with the Suite / Support tier; the High
  Volume API add-on lifts qualifying plans to 2,500 req/min.
sources:
  - https://developer.zendesk.com/api-reference/introduction/rate-limits/
  - https://www.zendesk.com/pricing/
headers:
  limit: X-Rate-Limit
  retryAfter: Retry-After
responseCodes:
  throttled: 429
limits:
  - name: Suite Team
    scope: account
    metric: requests_per_minute
    limit: 200
    timeFrame: minute
  - name: Suite Growth
    scope: account
    metric: requests_per_minute
    limit: 400
    timeFrame: minute
  - name: Suite Professional
    scope: account
    metric: requests_per_minute
    limit: 400
    timeFrame: minute
  - name: Suite Enterprise
    scope: account
    metric: requests_per_minute
    limit: 700
    timeFrame: minute
  - name: Suite Enterprise Plus
    scope: account
    metric: requests_per_minute
    limit: 2500
    timeFrame: minute
  - name: Support Essential (legacy)
    scope: account
    metric: requests_per_minute
    limit: 10
    timeFrame: minute
  - name: Support Team
    scope: account
    metric: requests_per_minute
    limit: 200
    timeFrame: minute
  - name: Support Professional
    scope: account
    metric: requests_per_minute
    limit: 400
    timeFrame: minute
  - name: Support Enterprise
    scope: account
    metric: requests_per_minute
    limit: 700
    timeFrame: minute
  - name: High Volume API add-on
    scope: account
    metric: requests_per_minute
    limit: 2500
    timeFrame: minute
    notes: Available on Growth+ (Suite) or Professional+ (Support); minimum 10 agent
      seats.
  - name: Update Ticket (per user, per ticket)
    scope: account
    metric: requests_per_minute
    limit: 30
    timeFrame: minute
    notes: 30 updates per 10 minutes per user per ticket; 100 requests/min account-wide.
  - name: Incremental Exports
    scope: account
    metric: requests_per_minute
    limit: 10
    timeFrame: minute
    notes: 30/min with the High Volume API add-on.
  - name: Update User (per user)
    scope: account
    metric: requests_per_minute
    limit: 5
    timeFrame: minute
  - name: Get Ticket Attachment Content
    scope: account
    metric: requests_per_minute
    limit: 2500
    timeFrame: minute
  - name: Job Queue depth
    scope: account
    metric: concurrent_requests
    limit: 30
    notes: Maximum concurrent queued or running jobs.
  - name: Account-wide spike protection
    scope: account
    metric: requests_per_minute
    limit: 100000
    timeFrame: minute
    notes: Hard ceiling that triggers spike-protection for unusual activity.
  - name: Apps API (per user / per app)
    scope: key
    metric: requests_per_minute
    limit: 100
    timeFrame: minute
    notes: 700 calls per 5 minutes per user per app at the API level.
policies:
  - name: 429 + Retry-After
    description: When the limit is exceeded the API returns 429 Too Many Requests with a
      Retry-After header indicating how many seconds to wait before retrying.
  - name: X-Rate-Limit header
    description: "Responses include an X-Rate-Limit header reflecting the account's
      current per-minute ceiling (e.g. X-Rate-Limit: 700)."
  - name: Plan-tier scoping
    description: Limits are account-wide and scale with the Suite / Support plan tier.
      Endpoint-specific limits apply on top of the per-plan ceiling.
  - name: High Volume API uplift
    description: The High Volume API add-on lifts qualifying plans to 2,500 req/min and
      also boosts incremental-exports throughput.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
