notes: >-
  Zendesk operates a public Trust Center and a Conveyor-hosted trust portal for
  on-demand, self-serve access to security artifacts (certifications, audit
  reports, completed security questionnaires). The certifications below are
  named on the Trust Center and Zendesk help articles. HIPAA support is available
  as a deployed add-on with a Business Associate Agreement on qualifying plans;
  PCI DSS handling relies on redaction tooling; FedRAMP is authorized at the
  LI-SaaS level. Product-in-scope varies by compliance program (see reference).
