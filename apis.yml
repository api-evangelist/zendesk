    description: >-
      The Zendesk Locales API is a read-only service that lets you discover which
      languages and regional variants Zendesk supports and which are enabled on your
      account. It provides lists of all supported locales, the subsets available to
      end users and to agents, and the current users locale, along with metadata
      such as the locale code (for example, en-US), display name, and whether the
      language is right-to-left.
  - aid: zendesk:macros
