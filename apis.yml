  - aid: zendesk:sell-custom-fields
    name: Zendesk Sell Custom Fields API
    tags:
      - CRM
      - Custom Fields
      - Sell
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
