    description: >-
      The Zendesk Imports API lets you programmatically load large volumes of records
      into Zendesk in a controlled, asynchronous wayideal for migrations, initial
      seeding, or ongoing syncs. You submit a file or batched payload, define which
      object type to import (for example, users/organizations/tickets in Support or
      leads/contacts/deals in Sell), and map fields. The import runs as a background
      job you can monitor via status endpoints, with progress, per-row validation,
      and detailed error reporting.
  - aid: zendesk:incremental
    name: Zendesk Incremental API
