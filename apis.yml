      access Zendesk data on a users or accounts behalf without sharing passwords.
      Developers register an OAuth client in a Zendesk account, redirect users to
      Zendesk for signin and consent, and exchange the returned authorization code
      for access (and optionally refresh) tokens.
  - aid: zendesk:object-layouts
