    description: >-
      The Zendesk Macros API lets you programmatically manage the reusable, predefined
      actions that agents apply to Support tickets. With it, you can list, create,
      update, delete, and reorder macros; fetch details and available action definitions
      to build editors; and determine which macros are available for a given ticket
      and user.
  - aid: zendesk:oauth
