        type: Documentation
      - url: openapi/incremental-openapi-original.yml
        type: OpenAPI
    description: >-
      The Zendesk Incremental API lets you export only the records that have changed
      since a specific point in time, making it easy to keep external systems in sync
      without repeatedly pulling full datasets. It supports core objects such as tickets,
      users, organizations, and ticket events, returning results in chronological
      order along with a checkpoint (an end_time or a cursor) you store and use on
      your next request to continue exactly where you left off.
  - aid: zendesk:job-statuses
    name: Zendesk Job Statuses
    tags:
      - Jobs
      - Statuses
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
