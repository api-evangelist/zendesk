        type: OpenAPI
    description: >-
      The Zendesk Groups API lets you programmatically manage the agent groups that
      power ticket routing and workflows in Zendesk Support. With it, you can create,
      list, retrieve, update, and delete groups, as well as fetch the set of groups
      a user can assign tickets to (assignable groups). Groups are used in ticket
      assignment, views, macros, and business rules like triggers and automations,
      so the API enables you to integrate group management into your provisioning
      and operations tooling.
  - aid: zendesk:imports
