      external destinations that Zendesk Support triggers and automations can notify
      when conditions are met. Using the API, you can create, list, update, activate/deactivate,
      and delete targets, configure details such as URLs, HTTP methods, authentication,
      and content types, and review delivery failures to troubleshoot outbound notifications.
  - aid: zendesk:ticket-audits
