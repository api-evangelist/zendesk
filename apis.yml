    description: >-
      Zendesk Job Statuses is the mechanism and API resource that tracks long-running,
      asynchronous tasks kicked off in Zendesksuch as bulk ticket updates, user or
      organization imports, and other create/update many operations. Instead of waiting
      for a synchronous response, these endpoints return a job ID that you can poll
      to see whether the work is queued, in progress, or completed, along with progress
      counts, result details, and any errors.
  - aid: zendesk:locales
