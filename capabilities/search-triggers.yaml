naftiko: 1.0.0-alpha2
info:
  label: Zendesk Search — Triggers
  description: 'Zendesk Search — Triggers. 1 operations. Lead operation: Zendesk Get  Api V2 Triggers Search. Self-contained
    Naftiko capability covering one Zendesk business surface.'
  tags:
  - Zendesk
  - Triggers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZENDESK_API_KEY: ZENDESK_API_KEY
capability:
  consumes:
  - type: http
    namespace: search-triggers
    baseUri: ''
    description: Zendesk Search — Triggers business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-triggers-search
      path: /api/v2/triggers/search
      operations:
      - name: searchtriggers
        method: GET
        description: Zendesk Get  Api V2 Triggers Search
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: search-triggers-rest
    port: 8080
    description: REST adapter for Zendesk Search — Triggers. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v2/triggers/search
      name: api-v2-triggers-search
      description: REST surface for api-v2-triggers-search.
      operations:
      - method: GET
        name: searchtriggers
        description: Zendesk Get  Api V2 Triggers Search
        call: search-triggers.searchtriggers
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: search-triggers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zendesk Search — Triggers. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: zendesk-get-api-v2-triggers
      description: Zendesk Get  Api V2 Triggers Search
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: search-triggers.searchtriggers
      outputParameters:
      - type: object
        mapping: $.
