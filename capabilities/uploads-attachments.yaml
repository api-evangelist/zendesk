naftiko: 1.0.0-alpha2
info:
  label: Zendesk Uploads — Attachments
  description: 'Zendesk Uploads — Attachments. 2 operations. Lead operation: Zendesk Post  Api V2 Uploads. Self-contained
    Naftiko capability covering one Zendesk business surface.'
  tags:
  - Zendesk
  - Attachments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZENDESK_API_KEY: ZENDESK_API_KEY
capability:
  consumes:
  - type: http
    namespace: uploads-attachments
    baseUri: ''
    description: Zendesk Uploads — Attachments business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-uploads
      path: /api/v2/uploads
      operations:
      - name: uploadfiles
        method: POST
        description: Zendesk Post  Api V2 Uploads
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-v2-uploads-token
      path: /api/v2/uploads/{token}
      operations:
      - name: deleteupload
        method: DELETE
        description: Zendesk Delete  Api V2 Uploads Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: path
          type: string
          description: The token of the uploaded attachment
          required: true
  exposes:
  - type: rest
    namespace: uploads-attachments-rest
    port: 8080
    description: REST adapter for Zendesk Uploads — Attachments. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v2/uploads
      name: api-v2-uploads
      description: REST surface for api-v2-uploads.
      operations:
      - method: POST
        name: uploadfiles
        description: Zendesk Post  Api V2 Uploads
        call: uploads-attachments.uploadfiles
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/uploads/{token}
      name: api-v2-uploads-token
      description: REST surface for api-v2-uploads-token.
      operations:
      - method: DELETE
        name: deleteupload
        description: Zendesk Delete  Api V2 Uploads Token
        call: uploads-attachments.deleteupload
        with:
          token: rest.token
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: uploads-attachments-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zendesk Uploads — Attachments. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: zendesk-post-api-v2-uploads
      description: Zendesk Post  Api V2 Uploads
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: uploads-attachments.uploadfiles
      outputParameters:
      - type: object
        mapping: $.
    - name: zendesk-delete-api-v2-uploads
      description: Zendesk Delete  Api V2 Uploads Token
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: uploads-attachments.deleteupload
      with:
        token: tools.token
      outputParameters:
      - type: object
        mapping: $.
