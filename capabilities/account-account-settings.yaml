      description: Zendesk Get  Api V2 Account Settings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: account-account-settings.showaccountsettings
      outputParameters:
      - type: object
        mapping: $.
    - name: zendesk-put-api-v2-account
      description: Zendesk Put  Api V2 Account Settings
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: account-account-settings.updateaccountsettings
      outputParameters:
      - type: object
        mapping: $.
