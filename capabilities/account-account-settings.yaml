  tags:
  - Zendesk
  - Account Settings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZENDESK_API_KEY: ZENDESK_API_KEY
capability:
  consumes:
  - type: http
    namespace: account-account-settings
    baseUri: ''
    description: Zendesk Account — Account Settings business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-account-settings
      path: /api/v2/account/settings
      operations:
      - name: showaccountsettings
        method: GET
        description: Zendesk Get  Api V2 Account Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateaccountsettings
        method: PUT
        description: Zendesk Put  Api V2 Account Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
