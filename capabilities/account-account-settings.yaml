    resources:
    - path: /v1/api/v2/account/settings
      name: api-v2-account-settings
      description: REST surface for api-v2-account-settings.
      operations:
      - method: GET
        name: showaccountsettings
        description: Zendesk Get  Api V2 Account Settings
        call: account-account-settings.showaccountsettings
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
