naftiko: 1.0.0-alpha2
info:
  label: Zendesk Problems — Tickets
  description: 'Zendesk Problems — Tickets. 2 operations. Lead operation: Zendesk Get  Api V2 Problems. Self-contained Naftiko
    capability covering one Zendesk business surface.'
  tags:
  - Zendesk
  - Tickets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZENDESK_API_KEY: ZENDESK_API_KEY
capability:
  consumes:
  - type: http
    namespace: problems-tickets
    baseUri: ''
    description: Zendesk Problems — Tickets business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-problems
      path: /api/v2/problems
      operations:
      - name: listticketproblems
        method: GET
        description: Zendesk Get  Api V2 Problems
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-v2-problems-autocomplete
      path: /api/v2/problems/autocomplete
      operations:
      - name: autocompleteproblems
        method: POST
        description: Zendesk Post  Api V2 Problems Autocomplete
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: text
          in: query
          type: string
          description: The text to search for
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: problems-tickets-rest
    port: 8080
    description: REST adapter for Zendesk Problems — Tickets. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v2/problems
      name: api-v2-problems
      description: REST surface for api-v2-problems.
      operations:
      - method: GET
        name: listticketproblems
        description: Zendesk Get  Api V2 Problems
        call: problems-tickets.listticketproblems
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/problems/autocomplete
      name: api-v2-problems-autocomplete
      description: REST surface for api-v2-problems-autocomplete.
      operations:
      - method: POST
        name: autocompleteproblems
        description: Zendesk Post  Api V2 Problems Autocomplete
        call: problems-tickets.autocompleteproblems
        with:
          text: rest.text
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: problems-tickets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zendesk Problems — Tickets. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: zendesk-get-api-v2-problems
      description: Zendesk Get  Api V2 Problems
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: problems-tickets.listticketproblems
      outputParameters:
      - type: object
        mapping: $.
    - name: zendesk-post-api-v2-problems
      description: Zendesk Post  Api V2 Problems Autocomplete
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: problems-tickets.autocompleteproblems
      with:
        text: tools.text
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
