naftiko: 1.0.0-alpha2
info:
  label: Zendesk Account — Reseller
  description: 'Zendesk Account — Reseller. 2 operations. Lead operation: Zendesk Post  Api V2 Accounts. Self-contained Naftiko
    capability covering one Zendesk business surface.'
  tags:
  - Zendesk
  - Reseller
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZENDESK_API_KEY: ZENDESK_API_KEY
capability:
  consumes:
  - type: http
    namespace: account-reseller
    baseUri: ''
    description: Zendesk Account — Reseller business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-accounts
      path: /api/v2/accounts
      operations:
      - name: createtrialaccount
        method: POST
        description: Zendesk Post  Api V2 Accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-v2-accounts-available
      path: /api/v2/accounts/available
      operations:
      - name: verifysubdomainavailability
        method: GET
        description: Zendesk Get  Api V2 Accounts Available
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subdomain
          in: query
          type: string
          description: Specify the name of the subdomain you want to verify. The name can't contain underscores, hyphens,
            or spaces.
          required: true
  exposes:
  - type: rest
    namespace: account-reseller-rest
    port: 8080
    description: REST adapter for Zendesk Account — Reseller. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v2/accounts
      name: api-v2-accounts
      description: REST surface for api-v2-accounts.
      operations:
      - method: POST
        name: createtrialaccount
        description: Zendesk Post  Api V2 Accounts
        call: account-reseller.createtrialaccount
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/accounts/available
      name: api-v2-accounts-available
      description: REST surface for api-v2-accounts-available.
      operations:
      - method: GET
        name: verifysubdomainavailability
        description: Zendesk Get  Api V2 Accounts Available
        call: account-reseller.verifysubdomainavailability
        with:
          subdomain: rest.subdomain
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: account-reseller-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zendesk Account — Reseller. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: zendesk-post-api-v2-accounts
      description: Zendesk Post  Api V2 Accounts
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: account-reseller.createtrialaccount
      outputParameters:
      - type: object
        mapping: $.
    - name: zendesk-get-api-v2-accounts
      description: Zendesk Get  Api V2 Accounts Available
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: account-reseller.verifysubdomainavailability
      with:
        subdomain: tools.subdomain
      outputParameters:
      - type: object
        mapping: $.
