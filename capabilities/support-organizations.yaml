    baseUri: https://{subdomain}.zendesk.com/api/v2
    description: Zendesk Support API — Organizations business capability. Self-contained, no shared references.
    resources:
    - name: organizations
      path: /organizations
      operations:
      - name: listorganizations
        method: GET
        description: Zendesk List Organizations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createorganization
        method: POST
        description: Zendesk Create Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: organizations-autocomplete
      path: /organizations/autocomplete
      operations:
      - name: autocompleteorganizations
        method: GET
        description: Zendesk Autocomplete Organizations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
          description: The prefix to match against organization names.
          required: true
    - name: organizations-search
      path: /organizations/search
      operations:
      - name: searchorganizations
        method: GET
        description: Zendesk Search Organizations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: external_id
          in: query
          type: string
          description: Search by external ID.
    - name: organizations-organization_id
      path: /organizations/{organization_id}
      operations:
      - name: getorganization
        method: GET
        description: Zendesk Show Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateorganization
        method: PUT
        description: Zendesk Update Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteorganization
        method: DELETE
        description: Zendesk Delete Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ZENDESK_API_KEY}}'
  exposes:
