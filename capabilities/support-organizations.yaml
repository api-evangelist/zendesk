      - method: GET
        name: searchorganizations
        description: Zendesk Search Organizations
        call: support-organizations.searchorganizations
        with:
          external_id: rest.external_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/organizations/{organization-id}
