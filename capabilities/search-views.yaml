naftiko: 1.0.0-alpha2
info:
  label: Zendesk Search — Views
  description: 'Zendesk Search — Views. 1 operations. Lead operation: Zendesk Get  Api V2 Views Search. Self-contained Naftiko
    capability covering one Zendesk business surface.'
  tags:
  - Zendesk
  - Views
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZENDESK_API_KEY: ZENDESK_API_KEY
capability:
  consumes:
  - type: http
    namespace: search-views
    baseUri: ''
    description: Zendesk Search — Views business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-views-search
      path: /api/v2/views/search
      operations:
      - name: searchviews
        method: GET
        description: Zendesk Get  Api V2 Views Search
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
          description: Query string used to find all views with matching title
          required: true
        - name: access
          in: query
          type: string
          description: Filter views by access. May be "personal", "shared", or "account"
        - name: active
          in: query
          type: boolean
          description: Filter by active views if true or inactive views if false
        - name: group_id
          in: query
          type: integer
          description: Filter views by group
        - name: sort_by
          in: query
          type: string
          description: Possible values are "alphabetical", "created_at", "updated_at", and "position". If unspecified, the
            views are sorted by relevance
        - name: sort_order
          in: query
          type: string
          description: One of "asc" or "desc". Defaults to "asc" for alphabetical and position sort, "desc" for all others
        - name: include
          in: query
          type: string
          description: A sideload to include in the response. See [Sideloads](#sideloads-3)
  exposes:
  - type: rest
    namespace: search-views-rest
    port: 8080
    description: REST adapter for Zendesk Search — Views. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v2/views/search
      name: api-v2-views-search
      description: REST surface for api-v2-views-search.
      operations:
      - method: GET
        name: searchviews
        description: Zendesk Get  Api V2 Views Search
        call: search-views.searchviews
        with:
          query: rest.query
          access: rest.access
          active: rest.active
          group_id: rest.group_id
          sort_by: rest.sort_by
          sort_order: rest.sort_order
          include: rest.include
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: search-views-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zendesk Search — Views. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: zendesk-get-api-v2-views
      description: Zendesk Get  Api V2 Views Search
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: search-views.searchviews
      with:
        query: tools.query
        access: tools.access
        active: tools.active
        group_id: tools.group_id
        sort_by: tools.sort_by
        sort_order: tools.sort_order
        include: tools.include
      outputParameters:
      - type: object
        mapping: $.
