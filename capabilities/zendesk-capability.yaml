naftiko: 1.0.0-alpha2
info:
  label: Zendesk Account
  description: Needs a description.
  tags:
  - Zendesk
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: zendesk
    baseUri: https://api.example.com
    description: Zendesk Account HTTP API.
    resources:
    - name: api-v2-account-settings
      path: /api/v2/account/settings
      operations:
      - name: showaccountsettings
        method: GET
        description: Zendesk Get Api V2 Account Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateaccountsettings
        method: PUT
        description: Zendesk Put Api V2 Account Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-v2-accounts
      path: /api/v2/accounts
      operations:
      - name: createtrialaccount
        method: POST
        description: Zendesk Post Api V2 Accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-v2-accounts-available
      path: /api/v2/accounts/available
      operations:
      - name: verifysubdomainavailability
        method: GET
        description: Zendesk Get Api V2 Accounts Available
        inputParameters:
        - name: subdomain
          in: query
          type: string
          required: true
          description: Specify the name of the subdomain you want to verify. The name can't contain underscores, hyphens,
            or spaces.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: zendesk-rest
    description: REST adapter for Zendesk Account.
    resources:
    - path: /api/v2/account/settings
      name: showaccountsettings
      operations:
      - method: GET
        name: showaccountsettings
        description: Zendesk Get Api V2 Account Settings
        call: zendesk.showaccountsettings
        outputParameters:
        - type: object
          mapping: $.
    - path: /api/v2/account/settings
      name: updateaccountsettings
      operations:
      - method: PUT
        name: updateaccountsettings
        description: Zendesk Put Api V2 Account Settings
        call: zendesk.updateaccountsettings
        outputParameters:
        - type: object
          mapping: $.
    - path: /api/v2/accounts
      name: createtrialaccount
      operations:
      - method: POST
        name: createtrialaccount
        description: Zendesk Post Api V2 Accounts
        call: zendesk.createtrialaccount
        outputParameters:
        - type: object
          mapping: $.
    - path: /api/v2/accounts/available
      name: verifysubdomainavailability
      operations:
      - method: GET
        name: verifysubdomainavailability
        description: Zendesk Get Api V2 Accounts Available
        call: zendesk.verifysubdomainavailability
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: zendesk-mcp
    transport: http
    description: MCP adapter for Zendesk Account for AI agent use.
    tools:
    - name: showaccountsettings
      description: Zendesk Get Api V2 Account Settings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zendesk.showaccountsettings
      outputParameters:
      - type: object
        mapping: $.
    - name: updateaccountsettings
      description: Zendesk Put Api V2 Account Settings
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: zendesk.updateaccountsettings
      outputParameters:
      - type: object
        mapping: $.
    - name: createtrialaccount
      description: Zendesk Post Api V2 Accounts
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: zendesk.createtrialaccount
      outputParameters:
      - type: object
        mapping: $.
    - name: verifysubdomainavailability
      description: Zendesk Get Api V2 Accounts Available
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zendesk.verifysubdomainavailability
      with:
        subdomain: tools.subdomain
      inputParameters:
      - name: subdomain
        type: string
        description: Specify the name of the subdomain you want to verify. The name can't contain underscores, hyphens, or
          spaces.
        required: true
      outputParameters:
      - type: object
        mapping: $.
