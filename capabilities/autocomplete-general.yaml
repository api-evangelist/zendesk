naftiko: 1.0.0-alpha2
info:
  label: Zendesk Autocomplete
  description: 'Zendesk Autocomplete. 1 operations. Lead operation: Zendesk Get  Api V2 Autocomplete Tags. Self-contained
    Naftiko capability covering one Zendesk business surface.'
  tags:
  - Zendesk
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZENDESK_API_KEY: ZENDESK_API_KEY
capability:
  consumes:
  - type: http
    namespace: autocomplete-general
    baseUri: ''
    description: Zendesk Autocomplete business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-autocomplete-tags
      path: /api/v2/autocomplete/tags
      operations:
      - name: autocompletetags
        method: GET
        description: Zendesk Get  Api V2 Autocomplete Tags
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: autocomplete-general-rest
    port: 8080
    description: REST adapter for Zendesk Autocomplete. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/v2/autocomplete/tags
      name: api-v2-autocomplete-tags
      description: REST surface for api-v2-autocomplete-tags.
      operations:
      - method: GET
        name: autocompletetags
        description: Zendesk Get  Api V2 Autocomplete Tags
        call: autocomplete-general.autocompletetags
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: autocomplete-general-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zendesk Autocomplete. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: zendesk-get-api-v2-autocomplete
      description: Zendesk Get  Api V2 Autocomplete Tags
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: autocomplete-general.autocompletetags
      outputParameters:
      - type: object
        mapping: $.
