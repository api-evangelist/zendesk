components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: >-
        Use your Zendesk email address followed by /token and your API
        token as the password. For example: user@example.com/token:api_token
    bearerAuth:
      type: http
      scheme: bearer
      description: OAuth 2.0 access token

  parameters:
    TicketId:
      name: ticket_id
      in: path
      required: true
      description: The ID of the ticket.
      schema:
        type: integer
        format: int64
    UserId:
      name: user_id
      in: path
      required: true
      description: The ID of the user.
      schema:
        type: integer
        format: int64
    OrganizationId:
      name: organization_id
      in: path
      required: true
      description: The ID of the organization.
      schema:
        type: integer
        format: int64
    PageParam:
      name: page
      in: query
      description: The page number.
      schema:
        type: integer
        default: 1
    PerPageParam:
      name: per_page
      in: query
      description: The number of results per page (max 100).
      schema:
        type: integer
        default: 100
        maximum: 100

  responses:
    Unauthorized:
      description: Authentication credentials are missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: >-
        The request was well-formed but could not be processed due to
        validation errors.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: Rate limit exceeded. Check the Retry-After header.
      headers:
        Retry-After:
          description: Number of seconds to wait before making another request.
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Ticket:
      type: object
      description: A Zendesk Support ticket representing a customer service request.
      properties:
        id:
          type: integer
          format: int64
          description: Automatically assigned ticket ID.
          readOnly: true
          example: abc123
        url:
          type: string
          format: uri
          description: The API URL of the ticket.
          readOnly: true
          example: https://www.example.com
        external_id:
          type: string
          nullable: true
          description: An ID from an external system.
          example: '500123'
        type:
          type: string
          enum:
          - problem
          - incident
          - question
          - task
          nullable: true
          description: The type of the ticket.
          example: problem
        subject:
          type: string
          description: The subject of the ticket.
          example: example_value
        raw_subject:
          type: string
          description: The original subject of the ticket as entered by the requester.
          readOnly: true
          example: example_value
        description:
          type: string
          description: The first comment on the ticket (read-only after creation).
          readOnly: true
          example: A sample description.
        priority:
          type: string
          enum:
          - urgent
          - high
          - normal
          - low
          nullable: true
          description: The urgency of the ticket.
          example: urgent
        status:
          type: string
          enum:
          - new
          - open
          - pending
          - hold
          - solved
          - closed
          description: The current status of the ticket.
          example: new
        recipient:
          type: string
          format: email
          nullable: true
          description: The original recipient email address of the ticket.
          readOnly: true
          example: example_value
        requester_id:
          type: integer
          format: int64
          description: The ID of the user who requested the ticket.
          example: '500123'
        submitter_id:
          type: integer
          format: int64
          description: The ID of the user who submitted the ticket.
          readOnly: true
          example: '500123'
        assignee_id:
          type: integer
          format: int64
          nullable: true
          description: The ID of the agent assigned to the ticket.
          example: '500123'
        organization_id:
          type: integer
          format: int64
          nullable: true
          description: The ID of the organization associated with the ticket.
          example: '500123'
        group_id:
          type: integer
          format: int64
          nullable: true
          description: The ID of the group assigned to the ticket.
          example: '500123'
        collaborator_ids:
          type: array
          items:
            type: integer
            format: int64
          description: IDs of users currently CC'd on the ticket.
          example: []
        follower_ids:
          type: array
          items:
            type: integer
            format: int64
          description: IDs of agents currently following the ticket.
          readOnly: true
          example: []
        email_cc_ids:
          type: array
          items:
            type: integer
            format: int64
          description: IDs of agents or end users currently CC'd on the ticket.
          example: user@example.com
        forum_topic_id:
          type: integer
          format: int64
          nullable: true
          description: The ID of the topic in the community forum, if applicable.
          readOnly: true
          example: '500123'
        problem_id:
          type: integer
          format: int64
          nullable: true
          description: >-
            For incident tickets, the ID of the associated problem ticket.
          example: '500123'
        has_incidents:
          type: boolean
          description: Whether the ticket has been marked as a problem with incidents.
          readOnly: true
          example: true
        is_public:
          type: boolean
          description: Whether the ticket has a public comment.
          readOnly: true
          example: true
        due_at:
          type: string
          format: date-time
          nullable: true
          description: The due date for task tickets (ISO 8601).
          example: '2026-01-15T10:30:00Z'
        tags:
          type: array
          items:
            type: string
          description: Tags applied to the ticket.
          example: []
        custom_fields:
          type: array
          items:
            $ref: '#/components/schemas/CustomField'
          description: Custom field key-value pairs.
          example: []
        satisfaction_rating:
          type: object
          nullable: true
          description: The satisfaction rating of the ticket, if rated.
          readOnly: true
          properties:
            score:
              type: string
              enum:
              - offered
              - unoffered
              - good
              - bad
            comment:
              type: string
          example: example_value
        sharing_agreement_ids:
          type: array
          items:
            type: integer
            format: int64
