          format: int64
          nullable: true
        collaborator_ids:
          type: array
          items:
            type: integer
            format: int64
        email_cc_ids:
          type: array
          items:
            type: integer
            format: int64
        problem_id:
          type: integer
          format: int64
          nullable: true

    TicketUpdate:
      type: object
