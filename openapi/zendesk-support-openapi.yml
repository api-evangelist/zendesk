    User:
      type: object
      description: >-
        A Zendesk user representing an end user, agent, or admin in the
        account.
      properties:
        id:
          type: integer
          format: int64
          description: Automatically assigned user ID.
          readOnly: true
        url:
          type: string
          format: uri
          description: The API URL of the user.
          readOnly: true
        name:
          type: string
          description: The name of the user.
        email:
          type: string
          format: email
          nullable: true
          description: The primary email address of the user.
        phone:
          type: string
          nullable: true
          description: The primary phone number of the user.
        photo:
          type: object
          nullable: true
          description: The user's profile photo.
          readOnly: true
          properties:
            id:
              type: integer
              format: int64
            file_name:
              type: string
            content_url:
              type: string
              format: uri
            content_type:
              type: string
            size:
              type: integer
            thumbnails:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                  file_name:
                    type: string
                  content_url:
                    type: string
                    format: uri
                  content_type:
                    type: string
                  size:
                    type: integer
        locale_id:
          type: integer
          nullable: true
          description: The locale ID of the user.
        locale:
          type: string
          description: The locale of the user (e.g., en-US).
          readOnly: true
        time_zone:
          type: string
          nullable: true
          description: The time zone of the user.
        organization_id:
          type: integer
          format: int64
          nullable: true
          description: The ID of the user's default organization.
        role:
          type: string
          enum:
            - end-user
            - agent
            - admin
          description: The role of the user.
        custom_role_id:
          type: integer
          format: int64
          nullable: true
          description: >-
            The custom role ID for agents with custom roles.
        verified:
          type: boolean
          description: Whether the user's identity has been verified.
        external_id:
          type: string
          nullable: true
          description: An external ID for the user from an integrated system.
        tags:
          type: array
          items:
            type: string
          description: Tags applied to the user.
        alias:
          type: string
          nullable: true
          description: An alias displayed instead of the agent's name.
        active:
          type: boolean
          description: Whether the user account is active.
          readOnly: true
        shared:
          type: boolean
          description: Whether the user is shared from a different Zendesk Support instance.
          readOnly: true
        shared_agent:
          type: boolean
          description: Whether the user is a shared agent from a different instance.
          readOnly: true
        shared_phone_number:
          type: boolean
          nullable: true
          description: Whether the phone number is shared.
          readOnly: true
        signature:
          type: string
          nullable: true
          description: The signature text appended to the agent's comments.
        details:
          type: string
          nullable: true
          description: Details about the user visible only to agents.
        notes:
          type: string
          nullable: true
          description: Notes about the user visible only to agents.
        restricted_agent:
          type: boolean
          description: >-
            Whether the agent has restrictions (true for agents in a custom
            role with restrictions).
          readOnly: true
        suspended:
          type: boolean
          description: Whether the user is suspended.
        default_group_id:
          type: integer
          format: int64
          nullable: true
          description: The default group ID for the agent.
        report_csv:
          type: boolean
          description: Whether the user can access the CSV report.
          readOnly: true
        only_private_comments:
          type: boolean
          description: >-
            Whether the user can only create private comments (for
            restricted end users).
        ticket_restriction:
          type: string
          enum:
            - organization
            - groups
            - assigned
            - requested
          nullable: true
          description: The ticket access restriction for the agent.
        moderator:
          type: boolean
          description: Whether the user has community moderator privileges.
        chat_only:
          type: boolean
          description: Whether the user is a chat-only agent.
          readOnly: true
        two_factor_auth_enabled:
          type: boolean
          nullable: true
          description: Whether two-factor authentication is enabled.
          readOnly: true
        user_fields:
          type: object
          additionalProperties: true
          description: Custom user field values (key-value pairs).
        last_login_at:
          type: string
          format: date-time
          nullable: true
          description: The last time the user signed in (ISO 8601).
          readOnly: true
        created_at:
          type: string
          format: date-time
          description: When the user was created (ISO 8601).
          readOnly: true
        updated_at:
          type: string
          format: date-time
          description: When the user was last updated (ISO 8601).
          readOnly: true

    UserCreate:
      type: object
      description: Payload for creating a new user.
      required:
        - name
      properties:
        name:
          type: string
          description: The name of the user.
        email:
          type: string
          format: email
          description: The user's email address.
        phone:
          type: string
          nullable: true
          description: The user's phone number.
        role:
          type: string
