        submitter_id:
          type: integer
          format: int64
          description: The ID of the submitter.
        assignee_id:
          type: integer
          format: int64
          nullable: true
          description: The ID of the assigned agent.
        group_id:
          type: integer
          format: int64
          nullable: true
          description: The ID of the assigned group.
        organization_id:
          type: integer
          format: int64
          nullable: true
        type:
