        time_zone:
          type: string
          nullable: true
        details:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        alias:
          type: string
          nullable: true
        signature:
          type: string
          nullable: true
        suspended:
          type: boolean
        user_fields:
          type: object
          additionalProperties: true

    Organization:
      type: object
      description: >-
        A Zendesk organization representing a company or group of users.
      properties:
        id:
          type: integer
          format: int64
          description: Automatically assigned organization ID.
          readOnly: true
        url:
          type: string
          format: uri
          description: The API URL of the organization.
          readOnly: true
        name:
          type: string
          description: The name of the organization.
        details:
          type: string
          nullable: true
          description: Details about the organization.
        notes:
          type: string
          nullable: true
          description: Notes about the organization visible only to agents.
        domain_names:
          type: array
          items:
            type: string
          description: >-
            Domain names associated with the organization. Users with
            matching email domains can be auto-assigned.
        group_id:
          type: integer
          format: int64
          nullable: true
          description: >-
            The default group assigned to tickets from this organization.
        shared_tickets:
          type: boolean
          description: >-
            Whether end users in the organization can see each other's
            tickets.
        shared_comments:
          type: boolean
          description: >-
            Whether end users in the organization can see each other's
            comments on tickets.
        external_id:
          type: string
          nullable: true
          description: An external ID from an integrated system.
        tags:
          type: array
          items:
            type: string
          description: Tags applied to the organization.
        organization_fields:
          type: object
          additionalProperties: true
          description: Custom organization field values (key-value pairs).
        created_at:
          type: string
          format: date-time
          description: When the organization was created (ISO 8601).
          readOnly: true
        updated_at:
          type: string
          format: date-time
          description: When the organization was last updated (ISO 8601).
          readOnly: true

    OrganizationCreate:
      type: object
      description: Payload for creating a new organization.
      required:
        - name
      properties:
        name:
          type: string
          description: The name of the organization.
        details:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        domain_names:
          type: array
          items:
            type: string
        group_id:
          type: integer
          format: int64
          nullable: true
        shared_tickets:
          type: boolean
          default: false
        shared_comments:
          type: boolean
          default: false
        external_id:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        organization_fields:
          type: object
          additionalProperties: true

    OrganizationUpdate:
      type: object
      description: Payload for updating an existing organization.
      properties:
        name:
          type: string
        details:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        domain_names:
          type: array
          items:
            type: string
        group_id:
          type: integer
          format: int64
          nullable: true
        shared_tickets:
          type: boolean
        shared_comments:
          type: boolean
        external_id:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        organization_fields:
          type: object
          additionalProperties: true

    Comment:
      type: object
      description: A comment on a ticket.
      properties:
        id:
          type: integer
          format: int64
          description: The ID of the comment.
          readOnly: true
        type:
          type: string
          enum:
            - Comment
            - VoiceComment
          description: The type of the comment.
          readOnly: true
        body:
          type: string
          description: The plain text body of the comment.
        html_body:
          type: string
          description: The HTML body of the comment.
        plain_body:
          type: string
          description: The plain text body with formatting stripped.
          readOnly: true
        public:
          type: boolean
          description: Whether the comment is public (visible to the requester).
        author_id:
          type: integer
          format: int64
          description: The ID of the comment author.
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
          description: Attachments on the comment.
          readOnly: true
        via:
          $ref: '#/components/schemas/Via'
        created_at:
          type: string
          format: date-time
          description: When the comment was created (ISO 8601).
          readOnly: true

    Attachment:
      type: object
      description: A file attachment.
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        file_name:
          type: string
        content_url:
          type: string
          format: uri
        content_type:
          type: string
        size:
          type: integer
          description: The size of the file in bytes.
        thumbnails:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                format: int64
              file_name:
                type: string
              content_url:
                type: string
                format: uri
              content_type:
                type: string
              size:
                type: integer

    Via:
      type: object
      description: How the ticket or comment was created.
      properties:
        channel:
          type: string
          description: >-
            The channel the ticket or comment came through (e.g., web, email,
            api, chat, voice).
        source:
          type: object
          properties:
            from:
              type: object
              additionalProperties: true
            to:
              type: object
              additionalProperties: true
            rel:
              type: string
              nullable: true

    CustomField:
      type: object
      description: A custom field key-value pair.
      properties:
        id:
          type: integer
          format: int64
          description: The ID of the custom field.
        value:
          description: The value of the custom field.
          oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: array
              items:
                type: string
          nullable: true

    Error:
      type: object
      description: An error response from the Zendesk API.
      properties:
        error:
          type: string
          description: The error type identifier.
        description:
          type: string
          description: A human-readable description of the error.
        details:
          type: object
          additionalProperties: true
          description: Additional details about the error.
