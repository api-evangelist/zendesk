    TicketCreate:
      type: object
      description: Payload for creating a new ticket.
      properties:
        subject:
          type: string
          description: The subject of the ticket.
        comment:
          type: object
          required:
            - body
          description: The initial comment (description) of the ticket.
          properties:
            body:
              type: string
              description: The body of the comment.
            html_body:
              type: string
              description: The HTML body of the comment.
            public:
              type: boolean
