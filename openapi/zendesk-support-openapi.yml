            - normal
            - low
          nullable: true
        status:
          type: string
          enum:
            - new
            - open
            - pending
            - hold
            - solved
          default: new
        tags:
          type: array
          items:
            type: string
        external_id:
          type: string
          nullable: true
        custom_fields:
          type: array
