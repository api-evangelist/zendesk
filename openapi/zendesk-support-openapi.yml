          nullable: true
        time_zone:
          type: string
          nullable: true
        details:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        alias:
          type: string
          nullable: true
        signature:
          type: string
          nullable: true
        verified:
          type: boolean
          default: false
        user_fields:
          type: object
          additionalProperties: true

    UserUpdate:
      type: object
      description: Payload for updating an existing user.
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        role:
          type: string
          enum:
            - end-user
            - agent
            - admin
        custom_role_id:
          type: integer
          format: int64
          nullable: true
        organization_id:
          type: integer
          format: int64
          nullable: true
        external_id:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        locale_id:
          type: integer
