openapi: 3.1.0
info:
  title: Zendesk Support API
  description: >-
    The Zendesk Support API provides programmatic access to the core resources
    of the Zendesk Support platform, including tickets, users, and
    organizations. It enables creating, reading, updating, and deleting
    support records, managing relationships between entities, and integrating
    Zendesk Support with external systems. The API uses JSON over HTTPS and
    supports authentication via OAuth 2.0 or API tokens.
  version: 2.0.0
  contact:
    name: Zendesk Developer Support
    url: https://developer.zendesk.com
  license:
    name: Zendesk API Terms
    url: https://www.zendesk.com/company/agreements-and-terms/
  x-logo:
    url: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg

externalDocs:
  description: Zendesk Support API Reference
  url: https://developer.zendesk.com/api-reference/ticketing/introduction/

servers:
- url: https://{subdomain}.zendesk.com/api/v2
  description: Zendesk Support API
  variables:
    subdomain:
      default: your-subdomain
      description: Your Zendesk subdomain

security:
- basicAuth: []
- bearerAuth: []

tags:
- name: Organizations
  description: Manage organizations
  externalDocs:
    url: https://developer.zendesk.com/api-reference/ticketing/organizations/organizations/

- name: Tickets
  description: Manage support tickets
  externalDocs:
    url: https://developer.zendesk.com/api-reference/ticketing/tickets/tickets/
- name: Users
  description: Manage users (end users, agents, admins)
  externalDocs:
    url: https://developer.zendesk.com/api-reference/ticketing/users/users/
paths:
  /tickets:
    get:
      operationId: listTickets
      summary: Zendesk List Tickets
      description: >-
        Returns a paginated list of tickets in the account. Tickets are sorted
        by created date in ascending order by default. Supports sideloading
        of related users, groups, and organizations.
      tags:
      - Tickets
      parameters:
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PerPageParam'
      - name: sort_by
        in: query
        description: The field to sort tickets by.
        schema:
          type: string
          enum:
          - created_at
          - updated_at
          - priority
          - status
          - ticket_type
          default: created_at
        example: created_at
      - name: sort_order
        in: query
        description: The sort order.
        schema:
          type: string
          enum:
          - asc
          - desc
          default: asc
        example: asc
      - name: external_id
        in: query
        description: Filter tickets by external ID.
        schema:
          type: string
        example: '500123'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  tickets:
                    type: array
                    items:
                      $ref: '#/components/schemas/Ticket'
                  next_page:
                    type: string
                    format: uri
                    nullable: true
                  previous_page:
                    type: string
                    format: uri
                    nullable: true
                  count:
                    type: integer
              examples:
                Listtickets200Example:
                  summary: Default listTickets 200 response
                  x-microcks-default: true
                  value:
                    tickets:
                    - id: abc123
                      url: https://www.example.com
                      external_id: '500123'
                      type: problem
                      subject: example_value
                      raw_subject: example_value
                      description: A sample description.
                      priority: urgent
                      status: new
                      recipient: example_value
                      requester_id: '500123'
                      submitter_id: '500123'
                      assignee_id: '500123'
                      organization_id: '500123'
                      group_id: '500123'
                      collaborator_ids:
                      - {}
                      follower_ids:
                      - {}
                      email_cc_ids:
                      - {}
                      forum_topic_id: '500123'
                      problem_id: '500123'
                      has_incidents: true
                      is_public: true
                      due_at: '2026-01-15T10:30:00Z'
                      tags:
                      - {}
                      custom_fields:
                      - {}
                      satisfaction_rating:
                        score: offered
                        comment: example_value
                      sharing_agreement_ids:
                      - {}
                      custom_status_id: '500123'
                      fields:
                      - {}
                      followup_ids:
                      - {}
                      ticket_form_id: '500123'
                      brand_id: '500123'
                      allow_channelback: true
                      allow_attachments: true
                      from_messaging_channel: true
                      created_at: '2026-01-15T10:30:00Z'
                      updated_at: '2026-01-15T10:30:00Z'
                    next_page: https://www.example.com
                    previous_page: https://www.example.com
                    count: 10
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: createTicket
      summary: Zendesk Create Ticket
      description: >-
        Creates a new ticket. You can set the requester, subject, description,
        priority, type, status, tags, custom fields, and other properties.
        Comments can be added during creation.
      tags:
      - Tickets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - ticket
              properties:
                ticket:
                  $ref: '#/components/schemas/TicketCreate'
            examples:
              CreateticketRequestExample:
                summary: Default createTicket request
                x-microcks-default: true
                value:
                  ticket:
                    subject: example_value
                    comment:
                      body: example_value
                      html_body: example_value
                      public: true
                      uploads:
                      - {}
                    requester_id: '500123'
                    requester:
                      name: Example Title
                      email: user@example.com
                      locale_id: '500123'
                    submitter_id: '500123'
                    assignee_id: '500123'
                    group_id: '500123'
                    organization_id: '500123'
                    type: problem
                    priority: urgent
                    status: new
                    tags:
                    - example_value
                    external_id: '500123'
                    custom_fields:
                    - {}
                    due_at: '2026-01-15T10:30:00Z'
                    ticket_form_id: '500123'
                    brand_id: '500123'
                    collaborator_ids:
                    - 10
                    email_cc_ids:
                    - 10
                    problem_id: '500123'
      responses:
        '201':
          description: Ticket created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticket:
                    $ref: '#/components/schemas/Ticket'
              examples:
                Createticket201Example:
                  summary: Default createTicket 201 response
                  x-microcks-default: true
                  value:
                    ticket:
                      id: abc123
                      url: https://www.example.com
                      external_id: '500123'
                      type: problem
                      subject: example_value
                      raw_subject: example_value
                      description: A sample description.
                      priority: urgent
                      status: new
                      recipient: example_value
                      requester_id: '500123'
                      submitter_id: '500123'
                      assignee_id: '500123'
                      organization_id: '500123'
                      group_id: '500123'
                      collaborator_ids:
                      - 10
                      follower_ids:
                      - 10
                      email_cc_ids:
                      - 10
                      forum_topic_id: '500123'
                      problem_id: '500123'
                      has_incidents: true
                      is_public: true
                      due_at: '2026-01-15T10:30:00Z'
                      tags:
                      - example_value
                      custom_fields:
                      - {}
                      satisfaction_rating:
                        score: offered
                        comment: example_value
                      sharing_agreement_ids:
                      - 10
                      custom_status_id: '500123'
                      fields:
                      - {}
                      followup_ids:
                      - 10
                      ticket_form_id: '500123'
                      brand_id: '500123'
                      allow_channelback: true
                      allow_attachments: true
                      from_messaging_channel: true
                      via:
                        channel: example_value
                        source: {}
                      created_at: '2026-01-15T10:30:00Z'
                      updated_at: '2026-01-15T10:30:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
