openapi: 3.1.0
info:
  title: Zendesk Support API
  description: >-
    The Zendesk Support API provides programmatic access to the core resources
    of the Zendesk Support platform, including tickets, users, and
    organizations. It enables creating, reading, updating, and deleting
    support records, managing relationships between entities, and integrating
    Zendesk Support with external systems. The API uses JSON over HTTPS and
    supports authentication via OAuth 2.0 or API tokens.
  version: 2.0.0
  contact:
    name: Zendesk Developer Support
    url: https://developer.zendesk.com
  license:
    name: Zendesk API Terms
    url: https://www.zendesk.com/company/agreements-and-terms/
  x-logo:
    url: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg

externalDocs:
  description: Zendesk Support API Reference
  url: https://developer.zendesk.com/api-reference/ticketing/introduction/

servers:
  - url: https://{subdomain}.zendesk.com/api/v2
    description: Zendesk Support API
    variables:
      subdomain:
        default: your-subdomain
        description: Your Zendesk subdomain

security:
  - basicAuth: []
  - bearerAuth: []

tags:
  - name: Organizations
    description: Manage organizations
    externalDocs:
      url: https://developer.zendesk.com/api-reference/ticketing/organizations/organizations/

  - name: Tickets
    description: Manage support tickets
    externalDocs:
      url: https://developer.zendesk.com/api-reference/ticketing/tickets/tickets/
  - name: Users
    description: Manage users (end users, agents, admins)
    externalDocs:
      url: https://developer.zendesk.com/api-reference/ticketing/users/users/
paths:
  /tickets:
    get:
      operationId: listTickets
      summary: Zendesk List Tickets
      description: >-
        Returns a paginated list of tickets in the account. Tickets are sorted
        by created date in ascending order by default. Supports sideloading
        of related users, groups, and organizations.
      tags:
        - Tickets
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: sort_by
          in: query
          description: The field to sort tickets by.
          schema:
            type: string
            enum:
              - created_at
              - updated_at
              - priority
              - status
              - ticket_type
            default: created_at
        - name: sort_order
          in: query
          description: The sort order.
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
        - name: external_id
          in: query
          description: Filter tickets by external ID.
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  tickets:
                    type: array
                    items:
                      $ref: '#/components/schemas/Ticket'
                  next_page:
                    type: string
                    format: uri
                    nullable: true
                  previous_page:
                    type: string
                    format: uri
                    nullable: true
                  count:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    post:
      operationId: createTicket
      summary: Zendesk Create Ticket
      description: >-
        Creates a new ticket. You can set the requester, subject, description,
        priority, type, status, tags, custom fields, and other properties.
        Comments can be added during creation.
      tags:
        - Tickets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ticket
              properties:
                ticket:
                  $ref: '#/components/schemas/TicketCreate'
      responses:
        '201':
          description: Ticket created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticket:
                    $ref: '#/components/schemas/Ticket'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /tickets/{ticket_id}:
    parameters:
      - $ref: '#/components/parameters/TicketId'
    get:
      operationId: getTicket
      summary: Zendesk Show Ticket
      description: Returns the details of a specific ticket.
      tags:
        - Tickets
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticket:
                    $ref: '#/components/schemas/Ticket'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    put:
      operationId: updateTicket
      summary: Zendesk Update Ticket
      description: >-
        Updates a ticket. You can update the status, priority, assignee,
        tags, custom fields, and add comments. Setting the status to
        "solved" or "closed" resolves or closes the ticket.
      tags:
        - Tickets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ticket
              properties:
                ticket:
                  $ref: '#/components/schemas/TicketUpdate'
      responses:
        '200':
          description: Ticket updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticket:
                    $ref: '#/components/schemas/Ticket'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    delete:
      operationId: deleteTicket
      summary: Zendesk Delete Ticket
      description: >-
        Permanently deletes a ticket. This operation cannot be undone.
        Deleted tickets are not recoverable.
      tags:
        - Tickets
      responses:
        '204':
          description: Ticket deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /tickets/{ticket_id}/comments:
    parameters:
      - $ref: '#/components/parameters/TicketId'
    get:
      operationId: listTicketComments
      summary: Zendesk List Ticket Comments
      description: Returns the comments on a specific ticket.
      tags:
        - Tickets
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: sort_order
          in: query
          description: Sort order for comments.
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  comments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Comment'
                  next_page:
                    type: string
                    format: uri
                    nullable: true
                  previous_page:
                    type: string
                    format: uri
                    nullable: true
                  count:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /users:
    get:
      operationId: listUsers
      summary: Zendesk List Users
      description: >-
        Returns a paginated list of all users in the account, including
        end users, agents, and admins. Supports filtering by role and
        permission set.
      tags:
        - Users
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: role
          in: query
          description: Filter by user role.
          schema:
            type: string
            enum:
              - end-user
              - agent
              - admin
        - name: permission_set
          in: query
          description: >-
            For custom roles, filter by the permission set ID.
          schema:
            type: integer
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  next_page:
                    type: string
                    format: uri
                    nullable: true
                  previous_page:
                    type: string
                    format: uri
                    nullable: true
                  count:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    post:
      operationId: createUser
      summary: Zendesk Create User
      description: >-
        Creates a new user. You must provide at least a name and an email
        address or phone number. The user role defaults to end-user.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user
              properties:
                user:
                  $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /users/{user_id}:
    parameters:
      - $ref: '#/components/parameters/UserId'
    get:
      operationId: getUser
      summary: Zendesk Show User
      description: Returns the details of a specific user.
      tags:
        - Users
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    put:
      operationId: updateUser
      summary: Zendesk Update User
      description: >-
        Updates a user. You can update the name, email, role, organization,
        tags, custom fields, and other properties.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user
              properties:
                user:
                  $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    delete:
      operationId: deleteUser
      summary: Zendesk Delete User
      description: >-
        Deletes a user. The user is soft-deleted and can be recovered
        within a limited time. Agents and admins can only be deleted by
        admins.
      tags:
        - Users
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /users/search:
    get:
      operationId: searchUsers
      summary: Zendesk Search Users
      description: >-
        Searches for users by name, email, external ID, or other criteria.
        Returns a paginated list of matching users.
      tags:
        - Users
      parameters:
        - name: query
          in: query
          required: true
          description: >-
            The search query. Supports name, email, phone, external_id,
            and other fields.
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  next_page:
                    type: string
                    format: uri
                    nullable: true
                  previous_page:
                    type: string
                    format: uri
                    nullable: true
                  count:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /organizations:
    get:
      operationId: listOrganizations
      summary: Zendesk List Organizations
      description: >-
        Returns a paginated list of all organizations in the account.
      tags:
        - Organizations
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  organizations:
                    type: array
                    items:
                      $ref: '#/components/schemas/Organization'
                  next_page:
                    type: string
                    format: uri
                    nullable: true
                  previous_page:
                    type: string
                    format: uri
                    nullable: true
                  count:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    post:
      operationId: createOrganization
      summary: Zendesk Create Organization
      description: >-
        Creates a new organization. You must provide a name. You can
        optionally set domains, tags, notes, and custom fields.
      tags:
        - Organizations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - organization
              properties:
                organization:
                  $ref: '#/components/schemas/OrganizationCreate'
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema:
                type: object
                properties:
                  organization:
                    $ref: '#/components/schemas/Organization'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /organizations/{organization_id}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      operationId: getOrganization
      summary: Zendesk Show Organization
      description: Returns the details of a specific organization.
      tags:
        - Organizations
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  organization:
                    $ref: '#/components/schemas/Organization'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    put:
      operationId: updateOrganization
      summary: Zendesk Update Organization
      description: >-
        Updates an organization. You can update the name, domains, notes,
        tags, details, and custom fields.
      tags:
        - Organizations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - organization
              properties:
                organization:
                  $ref: '#/components/schemas/OrganizationUpdate'
      responses:
        '200':
          description: Organization updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  organization:
                    $ref: '#/components/schemas/Organization'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    delete:
      operationId: deleteOrganization
      summary: Zendesk Delete Organization
      description: >-
        Permanently deletes an organization. Users associated with the
        organization are not deleted, but their organization membership
        is removed.
      tags:
        - Organizations
      responses:
        '204':
          description: Organization deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /organizations/search:
    get:
      operationId: searchOrganizations
      summary: Zendesk Search Organizations
      description: >-
        Searches for organizations by name or external ID.
      tags:
        - Organizations
      parameters:
        - name: external_id
          in: query
          description: Search by external ID.
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  organizations:
                    type: array
                    items:
                      $ref: '#/components/schemas/Organization'
                  next_page:
                    type: string
                    format: uri
                    nullable: true
                  previous_page:
                    type: string
                    format: uri
                    nullable: true
                  count:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /organizations/autocomplete:
    get:
      operationId: autocompleteOrganizations
      summary: Zendesk Autocomplete Organizations
      description: >-
        Returns organizations whose names start with the given string.
        Useful for building type-ahead search interfaces.
      tags:
        - Organizations
      parameters:
        - name: name
          in: query
          required: true
          description: The prefix to match against organization names.
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  organizations:
                    type: array
                    items:
                      $ref: '#/components/schemas/Organization'
                  next_page:
                    type: string
                    format: uri
                    nullable: true
                  previous_page:
                    type: string
                    format: uri
                    nullable: true
                  count:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: >-
        Use your Zendesk email address followed by /token and your API
        token as the password. For example: user@example.com/token:api_token
    bearerAuth:
      type: http
      scheme: bearer
      description: OAuth 2.0 access token

  parameters:
    TicketId:
      name: ticket_id
      in: path
      required: true
      description: The ID of the ticket.
      schema:
        type: integer
        format: int64
    UserId:
      name: user_id
      in: path
      required: true
      description: The ID of the user.
      schema:
        type: integer
        format: int64
    OrganizationId:
      name: organization_id
      in: path
      required: true
      description: The ID of the organization.
      schema:
        type: integer
        format: int64
    PageParam:
      name: page
      in: query
      description: The page number.
      schema:
        type: integer
        default: 1
    PerPageParam:
      name: per_page
      in: query
      description: The number of results per page (max 100).
      schema:
        type: integer
        default: 100
        maximum: 100

  responses:
    Unauthorized:
      description: Authentication credentials are missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: >-
        The request was well-formed but could not be processed due to
        validation errors.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: Rate limit exceeded. Check the Retry-After header.
      headers:
        Retry-After:
          description: Number of seconds to wait before making another request.
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Ticket:
      type: object
      description: A Zendesk Support ticket representing a customer service request.
      properties:
        id:
          type: integer
          format: int64
          description: Automatically assigned ticket ID.
          readOnly: true
        url:
          type: string
          format: uri
          description: The API URL of the ticket.
          readOnly: true
        external_id:
          type: string
          nullable: true
          description: An ID from an external system.
        type:
          type: string
          enum:
            - problem
            - incident
            - question
            - task
          nullable: true
          description: The type of the ticket.
        subject:
          type: string
          description: The subject of the ticket.
        raw_subject:
          type: string
          description: The original subject of the ticket as entered by the requester.
          readOnly: true
        description:
          type: string
          description: The first comment on the ticket (read-only after creation).
          readOnly: true
        priority:
          type: string
          enum:
            - urgent
            - high
            - normal
            - low
          nullable: true
          description: The urgency of the ticket.
        status:
          type: string
          enum:
            - new
            - open
            - pending
            - hold
            - solved
            - closed
          description: The current status of the ticket.
        recipient:
          type: string
          format: email
          nullable: true
          description: The original recipient email address of the ticket.
          readOnly: true
        requester_id:
          type: integer
          format: int64
          description: The ID of the user who requested the ticket.
        submitter_id:
          type: integer
          format: int64
          description: The ID of the user who submitted the ticket.
          readOnly: true
        assignee_id:
          type: integer
          format: int64
          nullable: true
          description: The ID of the agent assigned to the ticket.
        organization_id:
          type: integer
          format: int64
          nullable: true
          description: The ID of the organization associated with the ticket.
        group_id:
          type: integer
          format: int64
          nullable: true
          description: The ID of the group assigned to the ticket.
        collaborator_ids:
          type: array
          items:
            type: integer
            format: int64
          description: IDs of users currently CC'd on the ticket.
        follower_ids:
          type: array
          items:
            type: integer
            format: int64
          description: IDs of agents currently following the ticket.
          readOnly: true
        email_cc_ids:
          type: array
          items:
            type: integer
            format: int64
          description: IDs of agents or end users currently CC'd on the ticket.
        forum_topic_id:
          type: integer
          format: int64
          nullable: true
          description: The ID of the topic in the community forum, if applicable.
          readOnly: true
        problem_id:
          type: integer
          format: int64
          nullable: true
          description: >-
            For incident tickets, the ID of the associated problem ticket.
        has_incidents:
          type: boolean
          description: Whether the ticket has been marked as a problem with incidents.
          readOnly: true
        is_public:
          type: boolean
          description: Whether the ticket has a public comment.
          readOnly: true
        due_at:
          type: string
          format: date-time
          nullable: true
          description: The due date for task tickets (ISO 8601).
        tags:
          type: array
          items:
            type: string
          description: Tags applied to the ticket.
        custom_fields:
          type: array
          items:
            $ref: '#/components/schemas/CustomField'
          description: Custom field key-value pairs.
        satisfaction_rating:
          type: object
          nullable: true
          description: The satisfaction rating of the ticket, if rated.
          readOnly: true
          properties:
            score:
              type: string
              enum:
                - offered
                - unoffered
                - good
                - bad
            comment:
              type: string
        sharing_agreement_ids:
          type: array
          items:
            type: integer
            format: int64
          description: IDs of sharing agreements used for the ticket.
          readOnly: true
        custom_status_id:
          type: integer
          format: int64
          nullable: true
          description: The ID of a custom ticket status.
        fields:
          type: array
          items:
            $ref: '#/components/schemas/CustomField'
          description: Custom field values (alias for custom_fields).
          readOnly: true
        followup_ids:
          type: array
          items:
            type: integer
            format: int64
          description: IDs of follow-up tickets created from this ticket.
          readOnly: true
        ticket_form_id:
          type: integer
          format: int64
          nullable: true
          description: The ID of the ticket form used for this ticket.
        brand_id:
          type: integer
          format: int64
          nullable: true
