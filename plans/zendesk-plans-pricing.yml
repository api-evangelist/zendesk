description: Machine-readable plans and pricing scaffold for this API provider. Conforms to the API Commons
  Plans schema. Tier limits and prices are scaffold defaults; replace with provider-published values.
plans:
  - id: zendesk-free
    name: Free
    type: freemium
    description: Free entry tier for the Zendesk API surface. Intended for evaluation, prototyping, and
      low-volume integrations. Real limits and pricing must be reconciled with the provider's published
      plan documentation.
    entries:
      - label: API Requests
        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - https://{subdomain}.zendesk.com
          - https://api.getbase.com
          - https://www.zopim.com
          - https://rtm.zopim.com
          - https://chat-api.zopim.com
          - https://api.smooch.io
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the free tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 10
        timeFrame: minute
        geo: global
        domains:
          - https://{subdomain}.zendesk.com
          - https://api.getbase.com
          - https://www.zopim.com
          - https://rtm.zopim.com
          - https://chat-api.zopim.com
          - https://api.smooch.io
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Public Documentation
      - name: Community Support
      - name: Sandbox Access
      - name: Zendesk Assignables API
      - name: Zendesk Target Type API
      - name: Zendesk Account API
      - name: Zendesk Accounts API
      - name: Zendesk Activities API
      - name: Zendesk Any Channel API
      - name: Zendesk Approval Workflow Instances API
      - name: Zendesk Attachments API
  - id: zendesk-pro
    name: Professional
    type: paid
    description: Production tier for Zendesk. Provides higher quotas, priority support, and access to
      the broader API portfolio. Pricing placeholder; align with the provider's pricing page.
    entries:
      - label: API Requests
        description: Monthly API request quota
        name: api_requests
        type: quota
        metric: requests
        limit: 100000
        timeFrame: month
        geo: global
        domains:
          - https://{subdomain}.zendesk.com
          - https://api.getbase.com
          - https://www.zopim.com
          - https://rtm.zopim.com
          - https://chat-api.zopim.com
          - https://api.smooch.io
        unit: 1
        price: TBD
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the professional tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 100
        timeFrame: minute
        geo: global
        domains:
          - https://{subdomain}.zendesk.com
          - https://api.getbase.com
          - https://www.zopim.com
          - https://rtm.zopim.com
          - https://chat-api.zopim.com
          - https://api.smooch.io
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Overage
        description: Per-request price after monthly quota is exceeded
        name: overage
        type: metered
        metric: requests
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://{subdomain}.zendesk.com
          - https://api.getbase.com
          - https://www.zopim.com
          - https://rtm.zopim.com
          - https://chat-api.zopim.com
          - https://api.smooch.io
        unit: 1000
        price: TBD
        userMultiplied: false
