notes: >-
  Zendesk versions its REST APIs in the URI path (current major version v2, e.g.
  /api/v2). Its Messaging/Conversations platform APIs are strictly versioned
  with major (v2) and occasional minor (v1.1) numbers, where a minor bump
  signals a breaking payload/behavior change without a fundamental redesign and
  a major bump signals removals or significant behavior changes. A published
  change policy classifies changes and commits to commercially reasonable
  advance notice via developer-site posts and the changelog (with at least two
  weeks notice for urgent security/performance changes). Breaking changes and
  deprecations are announced on the developer Changelog and via Developer
  updates.
