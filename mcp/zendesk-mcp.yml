notes: >-
  Zendesk has adopted the Model Context Protocol as part of its AI strategy,
  announced at the Relate conference. Two capabilities: (1) an MCP *Client* that
  lets admins connect Zendesk to external MCP servers and use their tools as
  steps in action flows — in Early Access Program now; and (2) an MCP *Server*
  that exposes Zendesk itself to external agents — Early Access scheduled for
  summer 2026. As of this writing Zendesk does not publish a stable, generally
  available hosted MCP endpoint URL, so this is recorded as a candidate. The
  tools[] below are DERIVED from the curated Zendesk Support OpenAPI operations
  as a representative agent surface, not an official Zendesk tool manifest.
