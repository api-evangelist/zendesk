pagination:
  default: offset
  recommended: cursor
  cursor:
    params: ['page[size]', 'page[after]', 'page[before]']
    response_fields: [links.next, links.last, links.prev, meta.has_more]
    max_page_size: 100
  offset:
    params: [per_page, page, sort_order]
    response_fields: [next_page, previous_page, count]
