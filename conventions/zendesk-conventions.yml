    limits: First 100 pages / 10,000 resources; exceeding returns HTTP 400.
sideloading:
  description: >-
    Related records can be embedded in a response via the include query
    parameter (e.g. ?include=users,groups,organizations), reducing round-trips.
  param: include
sorting:
  params: [sort_by, sort_order]
metadata:
  external_id: Most core objects carry a client-supplied external_id for idempotent upserts / cross-system keys.
  custom_fields: Tickets, users, and organizations support custom_fields and tags.
async_jobs:
  description: >-
    Bulk create/update operations return a Job Status you poll (queued /
